<style>
.admin-orders-container{
    max-width:1000px;
    margin:auto;
    padding:40px;
    font-family:Arial, Helvetica, sans-serif;
}

.admin-title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
    color:#333;
}

.order-card{
    background:white;
    padding:25px;
    margin-bottom:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.3s;
}

.order-card:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.order-id{
    font-size:1.5rem;
    font-weight:700;
    margin-bottom:10px;
    color:#1f2937;
}

.order-info{
    font-size:1rem;
    margin-bottom:8px;
    color:#444;
}

.status{
    display:inline-block;
    padding:6px 12px;
    border-radius:6px;
    background:#667eea;
    color:white;
    font-weight:600;
}

.items-section{
    margin-top:15px;
    margin-bottom:15px;
}

.items-section h4{
    margin-bottom:10px;
    color:#333;
}

.item{
    background:#f5f5f5;
    padding:8px 12px;
    border-radius:6px;
    margin-bottom:6px;
}

.update-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 18px;
    background:#10b981;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
}

.update-btn:hover{
    background:#059669;
}
</style>


<div class="admin-orders-container">

<h2 class="admin-title">Admin: All Orders</h2>

{% for order in orders %}

<div class="order-card">

<h3 class="order-id">Order #{{ order.id }}</h3>

<p class="order-info">
<strong>Customer:</strong> {{ order.user.username }}
</p>

<p class="order-info">
<strong>Status:</strong> 
<span class="status">{{ order.order_status }}</span>
</p>

<div class="items-section">

<h4>Items:</h4>

{% for item in order.items %}

<div class="item">
{{ item.product.name }} × {{ item.quantity }}
</div>

{% endfor %}

</div>

<a href="{{ url_for('main.update_order_status', order_id=order.id) }}" class="update-btn">
Update Status
</a>

</div>

{% endfor %}

</div>
