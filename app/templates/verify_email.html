<!DOCTYPE html>
<html>
<head>
<title>Email Verification</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    width:350px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:10px;
}

p{
    color:gray;
    font-size:14px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
    text-align:center;
    letter-spacing:4px;
}

input:focus{
    outline:none;
    border-color:#2a5298;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    background:#2a5298;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e3c72;
}

</style>

</head>

<body>

<div class="container">

<h2>Email Verification</h2>

<p>A verification code has been sent to your email.</p>

<form method="POST">

<input type="text" name="code" placeholder="Enter verification code" required>

<button type="submit">Verify</button>

</form>

</div>

</body>
</html>
