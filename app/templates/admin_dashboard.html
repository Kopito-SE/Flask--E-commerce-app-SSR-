<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">  
</head>
<body>
  <h1 class="text-center mt-4">Admin Dashboard</h1>

  <div class="container mt-5">
    <!-- First row: Stats cards -->
    <div class="row">
      <div class="col-md-3">
        <div class="card text-center shadow">
          <div class="card-body">
            <h5>Total Users</h5>
            <h2>{{ total_users }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-center shadow">
          <div class="card-body">
            <h5>Total Products</h5>
            <h2>{{ total_products }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-center shadow">
          <div class="card-body">
            <h5>Total Categories</h5>
            <h2>{{ total_categories }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-center shadow">
          <div class="card-body">
            <h5>Total Orders</h5>
            <h2>{{ total_orders }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3 mt-3"> <!-- Added mt-3 for spacing -->
        <div class="card text-center shadow">
          <div class="card-body">
            <h5>Total Revenue</h5>
            <h2>Ksh {{ revenue }}</h2>
          </div>
        </div>
      </div>
    </div> <!-- Close first row -->

    <!-- Second row: Revenue chart -->
    <div class="row mt-5">
      <div class="col-12">
        <h3>Revenue Overview</h3>
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
  </div> <!-- Close container -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>

const ctx = document.getElementById('revenueChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: ['Revenue'],
datasets: [{
label: 'Total Revenue',
data: [{{ revenue }}],
borderWidth: 1
}]
},
options: {
scales: {
y: {
beginAtZero: true
}
}
}
});

</script>
</body>
